name: Build NDS Homebrew

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compila .nds con devkitARM
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout codice sorgente
        uses: actions/checkout@v4

      - name: Installa devkitPRO
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget make
          wget -U "dkp-apt" https://apt.devkitpro.org/install-devkitpro-pacman -O /tmp/install-dkp.sh
          chmod +x /tmp/install-dkp.sh
          sudo /tmp/install-dkp.sh
          sudo dkp-pacman --noconfirm -S nds-dev

      - name: Trova e compila
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH=/opt/devkitpro/tools/bin:/opt/devkitpro/devkitARM/bin:$PATH

          # Trova il Makefile (root o sottocartella)
          if [ -f "Makefile" ]; then
            echo ">> Makefile trovato in ROOT"
            BUILD_DIR="."
          elif [ -f "nds_texture_editor/Makefile" ]; then
            echo ">> Makefile trovato in nds_texture_editor/"
            BUILD_DIR="nds_texture_editor"
          else
            echo "ERRORE: Makefile non trovato!"
            find . -name "Makefile" || true
            exit 1
          fi

          cd "$BUILD_DIR"
          echo ">> Directory di build: $(pwd)"
          ls -la
          make clean || true
          make -j$(nproc)
          find . -name "*.nds" -exec ls -lh {} \;

      - name: Pubblica nds_texture_editor.nds
        uses: actions/upload-artifact@v4
        with:
          name: nds_texture_editor
          path: "**/*.nds"
          retention-days: 90
          if-no-files-found: error

